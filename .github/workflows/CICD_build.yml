name: CI Build Linux

on:
  push:
    branches: ["main"]
    tags:
      - "v[0-9]+.[0-9]+"
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      file_type:
        description: "File type to upload (hex or elf)"
        required: true
        default: "hex"
        type: choice
        options:
          - hex
          - elf

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        target: [EMILIS_G071, EMILIS_G071_4IN1]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install ARM SDK
        shell: bash
        run: |
          make arm_sdk_install

      - name: Build ${{ matrix.target }}
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            make ${{ matrix.target }}
          elif [ "$RUNNER_OS" == "Windows" ]; then
            tools/windows/make/bin/make ${{ matrix.target }}
          fi

      - name: Archive build
        uses: actions/upload-artifact@v4
        with:
          name: AM32-${{ matrix.target }}-${{ matrix.os }}
          path: |
            obj/*.${{ inputs.file_type || 'hex' }}
          retention-days: 60

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: obj/*.${{ inputs.file_type || 'hex' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
